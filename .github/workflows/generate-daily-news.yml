name: Generate Daily News

on:
  schedule:
    - cron: '30 0 * * *'  # 00:30 UTC = 6:00 AM IST
  workflow_dispatch:

jobs:
  scrape-news:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: npm install cheerio

      - name: Scrape and insert daily news
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        with:
          script: |
            const cheerio = require('cheerio');

            const today = new Date().toISOString().split('T')[0];
            console.log(`📰 Generating daily news for ${today}`);

            // ── Helper: fetch HTML ──
            async function fetchHTML(url) {
              const res = await fetch(url, {
                headers: { 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36' }
              });
              if (!res.ok) throw new Error(`HTTP ${res.status} for ${url}`);
              return await res.text();
            }

            // ── Scrape The Hindu ──
            async function scrapeHinduNews() {
              const sections = [
                { url: 'https://www.thehindu.com/news/national/', category: 'Legal' },
                { url: 'https://www.thehindu.com/business/', category: 'Economy' },
                { url: 'https://www.thehindu.com/news/international/', category: 'International' },
                { url: 'https://www.thehindu.com/sci-tech/', category: 'Science' },
              ];

              const allArticles = [];

              for (const section of sections) {
                try {
                  console.log(`  Fetching Hindu ${section.category}: ${section.url}`);
                  const html = await fetchHTML(section.url);
                  const $ = cheerio.load(html);

                  const articles = [];
                  $('a.story-card-news, a.story-card75x, a[href*="/article"], .element a[href*="/article"]').each((i, el) => {
                    if (articles.length >= 3) return false;
                    const $el = $(el);
                    const href = $el.attr('href');
                    const title = $el.find('h3, .title, .story-card-news-title').text().trim() || $el.text().trim();

                    if (title && href && title.length > 15 && !articles.some(a => a.url === href)) {
                      articles.push({
                        headline: title.replace(/\s+/g, ' ').substring(0, 200),
                        source_url: href.startsWith('http') ? href : `https://www.thehindu.com${href}`,
                        category: section.category
                      });
                    }
                  });

                  console.log(`    Found ${articles.length} articles for ${section.category}`);
                  allArticles.push(...articles);
                } catch (err) {
                  console.error(`  Error scraping Hindu ${section.category}:`, err.message);
                }
              }

              return allArticles;
            }

            // ── Scrape Indian Express ──
            async function scrapeExpressNews() {
              const sections = [
                { url: 'https://indianexpress.com/section/india/', category: 'Legal' },
                { url: 'https://indianexpress.com/section/business/', category: 'Economy' },
                { url: 'https://indianexpress.com/section/world/', category: 'International' },
                { url: 'https://indianexpress.com/section/technology/', category: 'Science' },
              ];

              const allArticles = [];

              for (const section of sections) {
                try {
                  console.log(`  Fetching Express ${section.category}: ${section.url}`);
                  const html = await fetchHTML(section.url);
                  const $ = cheerio.load(html);

                  const articles = [];
                  $('h2 a, h3 a, .title a, .articles a[href*="indianexpress.com"]').each((i, el) => {
                    if (articles.length >= 3) return false;
                    const $el = $(el);
                    const href = $el.attr('href');
                    const title = $el.text().trim();

                    if (title && href && title.length > 15 && href.includes('indianexpress.com') && !articles.some(a => a.url === href)) {
                      articles.push({
                        headline: title.replace(/\s+/g, ' ').substring(0, 200),
                        source_url: href,
                        category: section.category
                      });
                    }
                  });

                  console.log(`    Found ${articles.length} articles for ${section.category}`);
                  allArticles.push(...articles);
                } catch (err) {
                  console.error(`  Error scraping Express ${section.category}:`, err.message);
                }
              }

              return allArticles;
            }

            // ── Generate summaries using Gemini ──
            async function generateSummaries(articles) {
              const prompt = `You are a news summarizer for CLAT (law entrance exam) aspirants in India.
              Given the following news headlines, generate a 1-2 sentence summary for each that is relevant for CLAT GK preparation.
              Focus on legal, constitutional, economic, and international significance.

              Return a JSON array where each element has: "headline" (exact same as input), "summary" (1-2 sentences, max 200 chars).

              Headlines:
              ${articles.map((a, i) => `${i+1}. ${a.headline}`).join('\n')}`;

              const geminiRes = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${process.env.GEMINI_API_KEY}`,
                {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: {
                      responseMimeType: 'application/json',
                      responseSchema: {
                        type: 'ARRAY',
                        items: {
                          type: 'OBJECT',
                          properties: {
                            headline: { type: 'STRING' },
                            summary: { type: 'STRING' }
                          },
                          required: ['headline', 'summary']
                        }
                      }
                    }
                  })
                }
              );

              if (!geminiRes.ok) {
                const errText = await geminiRes.text();
                throw new Error(`Gemini API error: ${geminiRes.status} - ${errText}`);
              }

              const geminiData = await geminiRes.json();
              const text = geminiData.candidates?.[0]?.content?.parts?.[0]?.text;
              if (!text) throw new Error('No text in Gemini response');

              return JSON.parse(text);
            }

            // ── Main execution ──
            try {
              // Scrape both sources
              const hinduArticles = await scrapeHinduNews();
              const expressArticles = await scrapeExpressNews();

              console.log(`\n📊 Hindu: ${hinduArticles.length} articles, Express: ${expressArticles.length} articles`);

              const allArticles = [
                ...hinduArticles.map(a => ({ ...a, source: 'The Hindu' })),
                ...expressArticles.map(a => ({ ...a, source: 'The Indian Express' }))
              ];

              if (allArticles.length === 0) {
                console.log('⚠️ No articles found. Exiting.');
                return;
              }

              // Generate summaries via Gemini
              console.log('\n🤖 Generating summaries via Gemini...');
              const summaries = await generateSummaries(allArticles);
              console.log(`  Got ${summaries.length} summaries`);

              // Merge summaries back into articles
              const newsRows = allArticles.map((article, idx) => {
                const matchedSummary = summaries.find(s => s.headline === article.headline);
                return {
                  news_date: today,
                  source: article.source,
                  category: article.category,
                  headline: article.headline,
                  summary: matchedSummary?.summary || `Key news from ${article.source} on ${article.category}.`,
                  source_url: article.source_url,
                  is_active: true
                };
              });

              // Insert into Supabase
              console.log(`\n💾 Inserting ${newsRows.length} news articles into Supabase...`);

              const insertRes = await fetch(
                `${process.env.SUPABASE_URL}/rest/v1/daily_news`,
                {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'apikey': process.env.SUPABASE_SERVICE_ROLE_KEY,
                    'Authorization': `Bearer ${process.env.SUPABASE_SERVICE_ROLE_KEY}`,
                    'Prefer': 'return=representation,resolution=merge-duplicates'
                  },
                  body: JSON.stringify(newsRows)
                }
              );

              if (!insertRes.ok) {
                const errBody = await insertRes.text();
                throw new Error(`Supabase insert failed: ${insertRes.status} - ${errBody}`);
              }

              const inserted = await insertRes.json();
              console.log(`✅ Successfully inserted ${inserted.length} news articles for ${today}`);
              console.log('Categories:', [...new Set(inserted.map(r => r.category))].join(', '));
              console.log('Sources:', [...new Set(inserted.map(r => r.source))].join(', '));

            } catch (err) {
              console.error('❌ Fatal error:', err.message);
              process.exit(1);
            }

  generate-mock-test:
    runs-on: ubuntu-latest
    needs: scrape-news
    steps:
      - name: Create daily_mock_tests table if it doesn't exist
        uses: actions/github-script@v7
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            console.log(`📋 Ensuring daily_mock_tests table exists for ${today}`);

            // SQL to create the table if it doesn't exist
            const createTableSQL = `
              CREATE TABLE IF NOT EXISTS daily_mock_tests (
                id uuid DEFAULT gen_random_uuid() PRIMARY KEY,
                test_date date NOT NULL,
                passage_text text NOT NULL,
                passage_category text NOT NULL,
                question_text text NOT NULL,
                options jsonb NOT NULL,
                correct_answer integer NOT NULL,
                explanation text,
                source text,
                is_active boolean DEFAULT true,
                created_at timestamptz DEFAULT now()
              );

              CREATE INDEX IF NOT EXISTS idx_daily_mock_tests_date ON daily_mock_tests(test_date);
              CREATE INDEX IF NOT EXISTS idx_daily_mock_tests_active ON daily_mock_tests(is_active);
            `;

            try {
              const tableRes = await fetch(
                `${process.env.SUPABASE_URL}/rest/v1/rpc/exec`,
                {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'apikey': process.env.SUPABASE_SERVICE_ROLE_KEY,
                    'Authorization': `Bearer ${process.env.SUPABASE_SERVICE_ROLE_KEY}`
                  },
                  body: JSON.stringify({ query: createTableSQL })
                }
              );

              if (!tableRes.ok) {
                console.log('Note: Table may already exist or RPC not available. Proceeding with insert.');
              } else {
                console.log('✅ Table created or verified');
              }
            } catch (err) {
              console.log('Note: Proceeding with insert. Table may already exist.');
            }

      - name: Generate mock test questions from daily news
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            console.log(`🧠 Generating mock test questions for ${today}`);

            // ── Fetch today's news articles from Supabase ──
            async function fetchTodaysNews() {
              const newsRes = await fetch(
                `${process.env.SUPABASE_URL}/rest/v1/daily_news?news_date=eq.${today}&is_active=eq.true`,
                {
                  headers: {
                    'apikey': process.env.SUPABASE_SERVICE_ROLE_KEY,
                    'Authorization': `Bearer ${process.env.SUPABASE_SERVICE_ROLE_KEY}`
                  }
                }
              );

              if (!newsRes.ok) {
                throw new Error(`Failed to fetch news: ${newsRes.status}`);
              }

              const news = await newsRes.json();
              console.log(`📰 Fetched ${news.length} news articles for ${today}`);
              return news;
            }

            // ── Generate questions using Gemini ──
            async function generateMockTestQuestions(newsArticles) {
              if (newsArticles.length === 0) {
                console.log('⚠️ No news articles found for today. Skipping question generation.');
                return [];
              }

              const articlesList = newsArticles.map((a, i) =>
                `${i+1}. Category: ${a.category}\n   Source: ${a.source}\n   Headline: ${a.headline}\n   Summary: ${a.summary}`
              ).join('\n\n');

              const prompt = `You are an expert CLAT (Common Law Admission Test) exam question designer. Your task is to generate 20 multiple-choice questions (MCQs) based on today's news articles.\n\nGuidelines:\n1. Create exactly 4 reading comprehension passages (~100 words each) from the news articles\n2. Passages should be categorized as: Legal/Constitutional, Economy/Business, International, Current Affairs/Science\n3. Generate 5 MCQs for each passage (20 total)\n4. Each question must follow CLAT exam format: Clear concise question text, Exactly 4 options, Only 1 correct answer, An explanation for the correct answer\n5. Questions should test comprehension, inference, and CLAT-relevant skills\n\nNews Articles to base passages on:\n${articlesList}\n\nReturn a JSON object with this structure:\n{"passages":[{"text":"passage text (~100 words)","category":"Legal/Constitutional | Economy/Business | International | Current Affairs/Science","questions":[{"text":"question text","options":["option 1","option 2","option 3","option 4"],"correct_answer":0,"explanation":"explanation text"}]}]}`;

              const geminiRes = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${process.env.GEMINI_API_KEY}`,
                {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: {
                      responseMimeType: 'application/json',
                      responseSchema: {
                        type: 'OBJECT',
                        properties: {
                          passages: {
                            type: 'ARRAY',
                            items: {
                              type: 'OBJECT',
                              properties: {
                                text: { type: 'STRING' },
                                category: { type: 'STRING' },
                                questions: {
                                  type: 'ARRAY',
                                  items: {
                                    type: 'OBJECT',
                                    properties: {
                                      text: { type: 'STRING' },
                                      options: { type: 'ARRAY', items: { type: 'STRING' } },
                                      correct_answer: { type: 'INTEGER' },
                                      explanation: { type: 'STRING' }
                                    },
                                    required: ['text', 'options', 'correct_answer', 'explanation']
                                  }
                                }
                              },
                              required: ['text', 'category', 'questions']
                            }
                          }
                        },
                        required: ['passages']
                      }
                    }
                  })
                }
              );

              if (!geminiRes.ok) {
                const errText = await geminiRes.text();
                throw new Error(`Gemini API error: ${geminiRes.status} - ${errText}`);
              }

              const geminiData = await geminiRes.json();
              const text = geminiData.candidates?.[0]?.content?.parts?.[0]?.text;
              if (!text) throw new Error('No text in Gemini response');

              return JSON.parse(text);
            }

            // ── Transform and insert questions ──
            async function insertMockTestQuestions(testData, newsArticles) {
              const insertRows = [];

              for (const passage of testData.passages) {
                const matchedNews = newsArticles.find(n => n.category === passage.category);
                const source = matchedNews?.source || 'Generated';

                for (const question of passage.questions) {
                  insertRows.push({
                    test_date: today,
                    passage_text: passage.text,
                    passage_category: passage.category,
                    question_text: question.text,
                    options: question.options,
                    correct_answer: question.correct_answer,
                    explanation: question.explanation,
                    source: source,
                    is_active: true
                  });
                }
              }

              console.log(`\n💾 Inserting ${insertRows.length} questions into daily_mock_tests...`);

              const insertRes = await fetch(
                `${process.env.SUPABASE_URL}/rest/v1/daily_mock_tests`,
                {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'apikey': process.env.SUPABASE_SERVICE_ROLE_KEY,
                    'Authorization': `Bearer ${process.env.SUPABASE_SERVICE_ROLE_KEY}`,
                    'Prefer': 'return=representation,resolution=merge-duplicates'
                  },
                  body: JSON.stringify(insertRows)
                }
              );

              if (!insertRes.ok) {
                const errBody = await insertRes.text();
                throw new Error(`Supabase insert failed: ${insertRes.status} - ${errBody}`);
              }

              const inserted = await insertRes.json();
              console.log(`✅ Successfully inserted ${inserted.length} mock test questions for ${today}`);
              console.log('Categories:', [...new Set(inserted.map(r => r.passage_category))].join(', '));
              console.log('Sources:', [...new Set(inserted.map(r => r.source))].join(', '));

              return inserted;
            }

            // ── Main execution ──
            try {
              const newsArticles = await fetchTodaysNews();

              if (newsArticles.length === 0) {
                console.log('⚠️ No news articles found. Skipping mock test generation.');
                return;
              }

              console.log('\n🤖 Generating questions via Gemini...');
              const testData = await generateMockTestQuestions(newsArticles);

              if (!testData.passages || testData.passages.length === 0) {
                throw new Error('No passages generated by Gemini');
              }

              console.log(`  Generated ${testData.passages.length} passages with ${testData.passages.reduce((acc, p) => acc + p.questions.length, 0)} total questions`);

              await insertMockTestQuestions(testData, newsArticles);

            } catch (err) {
              console.error('❌ Fatal error:', err.message);
              process.exit(1);
            }
