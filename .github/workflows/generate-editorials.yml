name: Generate Daily Editorials

on:
  schedule:
    - cron: '30 0 * * *'  # 00:30 UTC = 6:00 AM IST
  workflow_dispatch: {}

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Install cheerio
        run: npm install cheerio

      - name: Scrape editorials and generate MCQs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cat << 'SCRIPT' > generate.mjs
          import * as cheerio from 'cheerio';

          const GEMINI_API_KEY = process.env.GEMINI_API_KEY;
          const SUPABASE_URL = process.env.SUPABASE_URL;
          const SUPABASE_KEY = process.env.SUPABASE_SERVICE_ROLE_KEY;
          const today = new Date().toISOString().split('T')[0];

          // ---- SCRAPING FUNCTIONS ----

          async function fetchHTML(url) {
            const res = await fetch(url, {
              headers: { 'User-Agent': 'Mozilla/5.0 (compatible; CLATTribeBot/1.0)' }
            });
            return await res.text();
          }

          async function scrapeHinduEditorials() {
            console.log('Scraping The Hindu editorials...');
            const html = await fetchHTML('https://www.thehindu.com/opinion/editorial/');
            const $ = cheerio.load(html);
            const links = [];
            $('a').each((i, el) => {
              const href = $(el).attr('href');
              if (href && href.match(/thehindu\.com\/opinion\/editorial\/[a-z]/) && href.includes('article')) {
                if (!links.includes(href)) links.push(href);
              }
            });
            const editorials = [];
            for (const url of links.slice(0, 2)) {
              try {
                const artHtml = await fetchHTML(url);
                const $a = cheerio.load(artHtml);
                const title = $a('h1').first().text().trim();
                const paragraphs = [];
                $a('article p').each((i, el) => {
                  const text = $a(el).text().trim();
                  if (text.length > 20) paragraphs.push(text);
                });
                const content = paragraphs.join('\n\n');
                const wordCount = content.split(/\s+/).length;
                editorials.push({ title, content, source: 'The Hindu', url, word_count: wordCount });
                console.log(`  Hindu: ${title} (${wordCount} words)`);
              } catch(e) {
                console.error(`  Error scraping ${url}: ${e.message}`);
              }
            }
            return editorials;
          }

          async function scrapeExpressEditorials() {
            console.log('Scraping Indian Express editorials...');
            const html = await fetchHTML('https://indianexpress.com/section/opinion/editorials/');
            const $ = cheerio.load(html);
            const links = [];
            $('a').each((i, el) => {
              const href = $(el).attr('href');
              if (href && href.match(/indianexpress\.com\/article\/opinion\/editorials\//)) {
                if (!links.includes(href)) links.push(href);
              }
            });
            const editorials = [];
            for (const url of links.slice(0, 2)) {
              try {
                const artHtml = await fetchHTML(url);
                const $a = cheerio.load(artHtml);
                const rawTitle = $a('h1').first().text().trim();
                const title = rawTitle.replace(/^Opinion\s*/i, '').trim();
                const paragraphs = [];
                $a('#pcl-full-content p').each((i, el) => {
                  const text = $a(el).text().trim();
                  if (text.length > 20) paragraphs.push(text);
                });
                if (paragraphs.length === 0) {
                  $a('.full-details p').each((i, el) => {
                    const text = $a(el).text().trim();
                    if (text.length > 20) paragraphs.push(text);
                  });
                }
                const content = paragraphs.join('\n\n');
                const wordCount = content.split(/\s+/).length;
                editorials.push({ title, content, source: 'The Indian Express', url, word_count: wordCount });
                console.log(`  Express: ${title} (${wordCount} words)`);
              } catch(e) {
                console.error(`  Error scraping ${url}: ${e.message}`);
              }
            }
            return editorials;
          }

          // ---- GEMINI MCQ GENERATION ----

          async function generateMCQs(editorial) {
            const prompt = `You are an expert CLAT exam question setter. Read this editorial and generate exactly 10 passage-based MCQs.

          EDITORIAL TITLE: ${editorial.title}
          SOURCE: ${editorial.source}
          CONTENT:
          ${editorial.content}

          Return a JSON object with this exact structure:
          {
            "summary": "2-3 sentence summary of the editorial for CLAT students",
            "category": "One of: Indian Polity, International Relations, Economy, Environment, Science & Tech, Social Issues, Governance, Legal & Judiciary",
            "mcqs": [
              {
                "question_number": 1,
                "question": "Question based on the editorial passage",
                "options": { "a": "Option A", "b": "Option B", "c": "Option C", "d": "Option D" },
                "correct_answer": "a",
                "explanation": "Brief explanation"
              }
            ]
          }

          MCQs must test reading comprehension, inference, legal reasoning, or critical analysis. Every answer must be derivable from the passage.`;

            const resp = await fetch(
              `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${GEMINI_API_KEY}`,
              {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: prompt }] }],
                  generationConfig: { responseMimeType: 'application/json' }
                })
              }
            );
            const data = await resp.json();
            const text = data.candidates[0].content.parts[0].text;
            return JSON.parse(text);
          }

          // ---- SUPABASE INSERT ----

          async function insertEditorial(editorial, mcqData) {
            const contentHtml = editorial.content.split('\n\n').map(p => `<p>${p}</p>`).join('');
            const readTime = Math.ceil(editorial.word_count / 200);

            const row = {
              title: editorial.title,
              summary: mcqData.summary,
              content: contentHtml,
              category: mcqData.category,
              source: editorial.source,
              source_url: editorial.url,
              word_count: editorial.word_count,
              read_time_minutes: readTime,
              date: today
            };

            const res = await fetch(`${SUPABASE_URL}/rest/v1/editorials`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`,
                'Prefer': 'return=representation'
              },
              body: JSON.stringify(row)
            });

            const [inserted] = await res.json();
            const editorialId = inserted.id;

            const mcqRows = mcqData.mcqs.map(m => ({
              editorial_id: editorialId,
              question_number: m.question_number,
              question: m.question,
              options: m.options,
              correct_answer: m.correct_answer,
              explanation: m.explanation
            }));

            await fetch(`${SUPABASE_URL}/rest/v1/editorial_mcqs`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`
              },
              body: JSON.stringify(mcqRows)
            });

            console.log(`  Inserted: ${editorial.title} + ${mcqData.mcqs.length} MCQs`);
          }

          // ---- MAIN ----

          async function main() {
            console.log(`=== Generating editorials for ${today} ===`);

            const hinduEditorials = await scrapeHinduEditorials();
            const expressEditorials = await scrapeExpressEditorials();
            const allEditorials = [...hinduEditorials, ...expressEditorials];

            console.log(`\nScraped ${allEditorials.length} editorials. Generating MCQs...\n`);

            for (const editorial of allEditorials) {
              try {
                const mcqData = await generateMCQs(editorial);
                await insertEditorial(editorial, mcqData);
              } catch(e) {
                console.error(`Error processing "${editorial.title}": ${e.message}`);
              }
            }

            console.log(`\nDone! Inserted ${allEditorials.length} editorials for ${today}`);
          }

          main();
          SCRIPT
          node generate.mjs
